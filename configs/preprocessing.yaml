## EEG preprocessing
eeg:
  raw_data_dir: "data/raw/pain_db/"
  output_dir: "data/processed/pain_db/"
  lowcut: 0.5
  highcut: 45.0
  notch: null
  window_duration: 2.0
  overlap: 0.5         
  target_fs: 128
  scale_to_uv: true
  reject_p2p_uv: null


## Questionnaire preprocessing
questionnaire:
  raw_data_path: "data/raw/pain_db/Demo_Questionnaires.xlsx"
  output_dir: "data/processed/pain_db/questionnaire"

  # Row indices to exclude (e.g. header rows, footnotes)
  rows_to_drop: [36, 37, 38, 39]
  # Value used to fill missing (NaN) answers
  fill_value: "Unknown"
  # Gender mapping
  gender_mapping:
    "F": "Femenine"
    "M": "Masculine"
  # Columns to drop (constant answers across all patients)
  columns_to_drop: 
    - "Have you suffered any head traumatism? "
    - "Do you suffer from any neurological disorder? (eg. epilepsy, Alzheimer, tinnitus)"
  # Pain Scale derivation from Brief Pain Inventory score
  pain_scale:
    source_column: "Pain Score (Actual Pain of Brief Pain Inventory)"
    bins: [-1, 3, 6, 11]
    labels: ["Low", "Moderate", "Severe"]
  # Column order expected in the raw file (for validation)
  expected_columns:
    - "ID"
    - "Pain Score (Actual Pain of Brief Pain Inventory)"
    - "Age"
    - "Gender"
    - "Etiology of NP*"
    - "Time with NP"
    - "Medical treatment for NP"
    - "Since when have you use the previous medication?"
    - "Have you had any medical procedures to control the pain?"
    - "Do you go regularly to phsychological or emotional counseling sessions for your pain?"
    - "Do you suffer from any neurological disorder? (eg. epilepsy, Alzheimer, tinnitus)"
    - "Have you suffered any head traumatism? "